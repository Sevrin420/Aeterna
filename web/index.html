<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Aeterna — Vita Aeterna</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage">
    <div class="console" id="console">
      <img class="console-art" src="assets/console.jpg" alt="" draggable="false" />

      <!-- Screen -->
      <div class="screen-bezel">
        <canvas id="screen" width="416" height="412"></canvas>
        <div class="scanlines"></div>
        <div class="boot-veil" id="bootVeil"></div>

        <!-- Chat -->
        <form class="chat-overlay" id="chatForm" hidden>
          <input class="naming-input" id="chatInput" type="text" maxlength="120" autocomplete="off" placeholder="Say something..." />
        </form>

        <!-- HUD overlay -->
        <div class="hud" id="hud" hidden>
          <div class="hud-name" id="hudName"></div>
          <div class="hud-duties" id="hudDuties">
            <span class="duty-pip" id="pipPray" title="Pray">P</span>
            <span class="duty-pip" id="pipGarden" title="Tend Garden">G</span>
            <span class="duty-pip" id="pipCandles" title="Light Candles">C</span>
          </div>
          <div class="hud-row"><span id="hudDevotion"></span><span id="hudStreak"></span></div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast" hidden></div>

        <!-- Leaderboard -->
        <div class="leaderboard-overlay" id="leaderboardOverlay" hidden>
          <p class="naming-title">Devotion Leaderboard</p>
          <ol class="leaderboard-list" id="leaderboardList"></ol>
          <button type="button" class="naming-submit" id="leaderboardClose">Close</button>
        </div>

        <!-- Mancala wager table (GDD section 10) -->
        <div class="mancala-overlay" id="mancalaOverlay" hidden>
          <p class="naming-title">Mancala — Wager Table</p>
          <p class="mancala-status" id="mancalaStatus"></p>
          <div class="mancala-board">
            <button type="button" class="mancala-store" id="mancalaStoreB" disabled></button>
            <div class="mancala-rows">
              <div class="mancala-row">
                <button type="button" class="mancala-pit" data-pit="12"></button>
                <button type="button" class="mancala-pit" data-pit="11"></button>
                <button type="button" class="mancala-pit" data-pit="10"></button>
                <button type="button" class="mancala-pit" data-pit="9"></button>
                <button type="button" class="mancala-pit" data-pit="8"></button>
                <button type="button" class="mancala-pit" data-pit="7"></button>
              </div>
              <div class="mancala-row">
                <button type="button" class="mancala-pit" data-pit="0"></button>
                <button type="button" class="mancala-pit" data-pit="1"></button>
                <button type="button" class="mancala-pit" data-pit="2"></button>
                <button type="button" class="mancala-pit" data-pit="3"></button>
                <button type="button" class="mancala-pit" data-pit="4"></button>
                <button type="button" class="mancala-pit" data-pit="5"></button>
              </div>
            </div>
            <button type="button" class="mancala-store" id="mancalaStoreA" disabled></button>
          </div>
          <button type="button" class="naming-submit" id="mancalaLeave">Leave Table</button>
        </div>

        <!-- Final Communion cinematic (GDD section 7, Day 56) -->
        <div class="communion-overlay" id="communionOverlay" hidden>
          <p class="communion-title">Final Communion</p>
          <p class="communion-body" id="communionBody"></p>
          <button type="button" class="naming-submit" id="communionClose">Continue</button>
        </div>
      </div>

      <!-- Mute -->
      <button type="button" class="mute-toggle" id="muteToggle" aria-label="Mute sound" aria-pressed="false">&#9834;</button>

      <!-- Power slider (Club Nile style: wood pill, ON/OFF labels, ridged knob) -->
      <button type="button" class="power-switch" id="powerSwitch" aria-label="Power" aria-pressed="false">
        <span class="power-track">
          <span class="power-txt power-on">ON</span>
          <span class="power-txt power-off">OFF</span>
          <span class="power-knob"></span>
        </span>
      </button>

      <!-- D-Pad: one continuous zone (press once, slide thumb to steer) -->
      <div class="dpad-zone" id="dpad" aria-label="D-pad"></div>

      <!-- Face buttons -->
      <div class="btn-hit btn-a" id="btnA" aria-label="A"></div>
      <div class="btn-hit btn-b" id="btnB" aria-label="B"></div>
    </div>
    <p class="hint" id="hint">Slide the switch to power on the console.</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
