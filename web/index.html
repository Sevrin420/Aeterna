<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Aeterna — Vita Aeterna</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="stage">
    <div class="console" id="console">
      <img class="console-art" src="assets/console.jpg" alt="" draggable="false" />

      <!-- Screen -->
      <div class="screen-bezel">
        <canvas id="screen" width="208" height="206"></canvas>
        <div class="scanlines"></div>
        <div class="boot-veil" id="bootVeil"></div>

        <!-- Naming overlay (dev-mode identity, see web/js/scenes/naming.js) -->
        <form class="naming-overlay" id="namingForm" hidden>
          <p class="naming-title">Speak your name, Cultist</p>
          <input class="naming-input" id="namingName" type="text" maxlength="24" autocomplete="off" placeholder="Name" required />
          <div class="naming-sex">
            <label><input type="radio" name="sex" value="male" checked /> Brother</label>
            <label><input type="radio" name="sex" value="female" /> Sister</label>
          </div>
          <input class="naming-input" id="namingHandle" type="text" maxlength="16" autocomplete="off" placeholder="@handle (optional)" />
          <button type="submit" class="naming-submit">Take the Oath</button>
        </form>

        <!-- Chat -->
        <form class="chat-overlay" id="chatForm" hidden>
          <input class="naming-input" id="chatInput" type="text" maxlength="120" autocomplete="off" placeholder="Say something..." />
        </form>

        <!-- HUD overlay -->
        <div class="hud" id="hud" hidden>
          <div class="hud-name" id="hudName"></div>
          <div class="hud-duties" id="hudDuties">
            <span class="duty-pip" id="pipPray" title="Pray">P</span>
            <span class="duty-pip" id="pipGarden" title="Tend Garden">G</span>
            <span class="duty-pip" id="pipCandles" title="Light Candles">C</span>
          </div>
          <div class="hud-row"><span id="hudDevotion"></span><span id="hudStreak"></span></div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast" hidden></div>

        <!-- Leaderboard -->
        <div class="leaderboard-overlay" id="leaderboardOverlay" hidden>
          <p class="naming-title">Devotion Leaderboard</p>
          <ol class="leaderboard-list" id="leaderboardList"></ol>
          <button type="button" class="naming-submit" id="leaderboardClose">Close</button>
        </div>
      </div>

      <!-- Mute -->
      <button type="button" class="mute-toggle" id="muteToggle" aria-label="Mute sound" aria-pressed="false">&#9834;</button>

      <!-- Power slider -->
      <button type="button" class="power-switch" id="powerSwitch" aria-label="Power" aria-pressed="false">
        <span class="power-track">
          <span class="power-knob"></span>
        </span>
        <span class="power-led"></span>
      </button>

      <!-- D-Pad hit zones -->
      <div class="dpad-hit" id="dpadUp" data-dir="up"></div>
      <div class="dpad-hit" id="dpadDown" data-dir="down"></div>
      <div class="dpad-hit" id="dpadLeft" data-dir="left"></div>
      <div class="dpad-hit" id="dpadRight" data-dir="right"></div>

      <!-- Face buttons -->
      <div class="btn-hit btn-a" id="btnA" aria-label="A"></div>
      <div class="btn-hit btn-b" id="btnB" aria-label="B"></div>
    </div>
    <p class="hint" id="hint">Slide the switch to power on the console.</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
