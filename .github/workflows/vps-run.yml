name: VPS Run Command

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Read-only diagnostic command to run on the VPS'
        required: true
        default: 'systemctl status hermes-gateway.service --no-pager'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Run command
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "${{ github.event.inputs.command }}"
