name: Deploy Aeterna Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch: {}

concurrency:
  group: deploy-aeterna-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync server code
        run: |
          rsync -az --delete \
            --exclude 'node_modules' \
            --exclude 'data' \
            --exclude '.env' \
            -e "ssh -i ~/.ssh/deploy_key" \
            server/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/aeterna-server/"

      # server/src/index.js resolves its static webRoot as ../../web relative
      # to src/, i.e. a sibling of /opt/aeterna-server — so the frontend has
      # to land at /opt/web or Fastify's static plugin fails to register and
      # the service crash-loops (this was previously missing entirely).
      - name: Sync web frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            web/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/web/"

      - name: Install deps and restart service
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/aeterna-server
            rm -rf node_modules
            npm ci --omit=dev
            systemctl restart aeterna-server
            sleep 1
            systemctl --no-pager status aeterna-server
          '

      - name: Verify externally reachable
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://${{ secrets.VPS_HOST }}:3000/" || echo "000")
          echo "External HTTP status on port 3000: $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Server did not respond 200 externally on port 3000 (check firewall/security group)."
          fi
